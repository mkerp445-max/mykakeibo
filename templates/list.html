<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>履歴一覧</title>
</head>
<body>
    <h1>入力内容の確認・削除</h1>
    <a href="/">メニューに戻る</a>
    <hr>

    <table border="1" style="width: 100%; text-align: center;">
        <tr>
            <th>日付</th>
            <th>項目</th>
            <th>区分</th>
            <th>金額</th>
            <th>操作</th>
        </tr>
    <!-- list.html の修正イメージ -->
{% for row in transactions %}
<tr>
    <td>{{ row['date'] }}</td>
    <td>{{ row['name'] }}</td>
    <td>{{ row['amount'] }}</td>
    <td>
        <a href="{{ url_for('input_delete', id=row['id']) }}" onclick="return confirm('削除しますか？')">削除</a>
    </td>
</tr>
{% endfor %}
    </table>

    {% if not transactions %}
    <p>データがありません。</p>
    {% endif %}
</body>
</html>
