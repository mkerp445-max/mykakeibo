<!-- summary_period_result.html -->
<!DOCTYPE html>
<html lang="ja">
<head><meta charset="UTF-8"><title>期間集計結果</title></head>
<body>
    <h1>{{ start }} から {{ end }} の集計結果</h1>
    <a href="/">メニューに戻る</a> | <a href="/summary_period_input">別の期間で集計</a>
    <hr>
    <img src="{{ url_for('static', filename='period_graph.png') }}" alt="集計グラフ">
    <table border="1">
        <tr><th>項目名</th><th>金額</th></tr>
        {% for row in data %}
        <tr>
            <td>{{ row['name'] }}</td>
            <td>{{ row['SUM(t.amount)'] }}円</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
