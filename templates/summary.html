<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>集計結果</title>
</head>
<body>
    <h1>{{ month }} の集計結果</h1>
    <a href="/">メニューに戻る</a>
    <hr>

    <div style="text-align: center;">
        <!-- 作成したグラフを表示 -->
        <img src="{{ url_for('static', filename='graph.png') }}?{{ range(1, 1000) | random }}" alt="集計グラフ" width="400">
    </div>

    <table border="1" align="center">
        <tr>
            <th>項目</th>
            <th>金額</th>
        </tr>
        {% for row in data %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }} 円</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
